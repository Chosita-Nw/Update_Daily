<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Work Tracker 🌸</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600&family=Mitr:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --pink-50:  #fff0f5;
    --pink-100: #ffe0ec;
    --pink-200: #ffb3cf;
    --pink-300: #ff85b3;
    --pink-400: #f7618f;
    --pink-500: #e0456f;
    --pink-600: #c03060;
    --rose-50:  #fff5f7;
    --rose-100: #fde8ed;
    --mauve:    #f3e6f0;
    --text-main: #4a2a38;
    --text-sub:  #9c6e82;
    --text-hint: #c4a0b0;
    --white:     #ffffff;
    --shadow:    0 2px 16px rgba(220,100,140,0.10);
    --shadow-lg: 0 4px 32px rgba(220,100,140,0.13);
    --radius-sm: 10px;
    --radius-md: 14px;
    --radius-lg: 20px;
    --radius-xl: 28px;
  }

  html { font-size: 15px; }
  body {
    font-family: 'Sarabun', sans-serif;
    background: var(--pink-50);
    color: var(--text-main);
    min-height: 100vh;
    padding-bottom: 3rem;
  }

  /* === HEADER === */
  .site-header {
    background: linear-gradient(135deg, #ffd6e7 0%, #ffecf3 60%, #fce4f0 100%);
    border-bottom: 1.5px solid var(--pink-100);
    padding: 1.5rem 2rem 1.25rem;
    position: sticky;
    top: 0;
    z-index: 50;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }
  .site-logo {
    font-family: 'Mitr', sans-serif;
    font-size: 1.35rem;
    font-weight: 500;
    color: var(--pink-500);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .site-logo .blossom { font-size: 1.4rem; }
  .header-date {
    font-size: 0.82rem;
    color: var(--text-sub);
    margin-top: 2px;
  }
  .btn-copy {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--white);
    color: var(--pink-500);
    font-family: 'Sarabun', sans-serif;
    font-size: 0.88rem;
    font-weight: 500;
    padding: 9px 18px;
    border-radius: 999px;
    border: 1.5px solid var(--pink-300);
    cursor: pointer;
    transition: all 0.18s;
  }
  .btn-copy:hover { background: var(--pink-50); }
  .btn-copy.copied { background: #e4f5e6; color: #3a9e4a; border-color: #a8ddb0; }

  .btn-add {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--pink-400);
    color: white;
    font-family: 'Sarabun', sans-serif;
    font-size: 0.88rem;
    font-weight: 500;
    padding: 9px 20px;
    border-radius: 999px;
    border: none;
    cursor: pointer;
    transition: background 0.18s, transform 0.12s;
    box-shadow: 0 2px 12px rgba(240,100,140,0.25);
  }
  .btn-add:hover { background: var(--pink-500); transform: translateY(-1px); }
  .btn-add:active { transform: scale(0.97); }
  .btn-add svg { width: 16px; height: 16px; }

  /* === MAIN LAYOUT === */
  .main { max-width: 760px; margin: 0 auto; padding: 2rem 1.5rem 0; }

  /* === STATS === */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 12px;
    margin-bottom: 1.75rem;
  }
  .stat-card {
    background: var(--white);
    border-radius: var(--radius-md);
    padding: 1rem;
    text-align: center;
    box-shadow: var(--shadow);
    border: 1px solid var(--pink-100);
  }
  .stat-num {
    font-family: 'Mitr', sans-serif;
    font-size: 1.75rem;
    font-weight: 500;
    line-height: 1;
    margin-bottom: 4px;
  }
  .stat-label { font-size: 0.75rem; color: var(--text-sub); }
  .stat-all   .stat-num { color: var(--pink-400); }
  .stat-proc  .stat-num { color: #6d9fe0; }
  .stat-done  .stat-num { color: #7eba82; }
  .stat-block .stat-num { color: #e07070; }

  /* === FILTER === */
  .filter-row {
    display: flex;
    gap: 8px;
    margin-bottom: 1.25rem;
    flex-wrap: wrap;
    align-items: center;
  }
  .filter-label { font-size: 0.78rem; color: var(--text-hint); }
  .filter-btn {
    font-family: 'Sarabun', sans-serif;
    font-size: 0.78rem;
    padding: 5px 14px;
    border-radius: 999px;
    border: 1.5px solid var(--pink-100);
    background: var(--white);
    color: var(--text-sub);
    cursor: pointer;
    transition: all 0.15s;
  }
  .filter-btn:hover { border-color: var(--pink-300); color: var(--pink-500); }
  .filter-btn.active {
    background: var(--pink-400);
    border-color: var(--pink-400);
    color: white;
    font-weight: 500;
  }

  /* === TASK CARDS === */
  .task-list { display: flex; flex-direction: column; gap: 12px; }

  .task-card {
    background: var(--white);
    border: 1.5px solid var(--pink-100);
    border-radius: var(--radius-lg);
    padding: 1.1rem 1.25rem;
    box-shadow: var(--shadow);
    transition: box-shadow 0.18s, transform 0.12s, border-color 0.18s;
    animation: slideIn 0.22s ease;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .task-card:hover {
    box-shadow: var(--shadow-lg);
    border-color: var(--pink-200);
    transform: translateY(-1px);
  }

  .task-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 10px;
    margin-bottom: 6px;
  }
  .task-name {
    font-size: 0.95rem;
    font-weight: 600;
    color: var(--text-main);
    flex: 1;
  }
  .task-actions { display: flex; gap: 4px; flex-shrink: 0; }
  .icon-btn {
    width: 30px; height: 30px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 50%;
    border: none;
    background: none;
    cursor: pointer;
    color: var(--text-hint);
    font-size: 0.9rem;
    transition: background 0.15s, color 0.15s;
  }
  .icon-btn:hover { background: var(--pink-50); color: var(--pink-400); }

  .task-desc {
    font-size: 0.85rem;
    color: var(--text-sub);
    margin-bottom: 10px;
    line-height: 1.55;
    white-space: pre-line;
  }

  .task-meta {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 6px;
  }

  /* status badges */
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 0.72rem;
    font-weight: 500;
    padding: 3px 10px;
    border-radius: 999px;
  }
  .badge-not-start  { background: #f3f0f8; color: #8a7aaa; }
  .badge-on-process { background: #e4f0fc; color: #3a7dd4; }
  .badge-success    { background: #e4f5e6; color: #3a9e4a; }
  .badge-blocked    { background: #fce8e8; color: #d44444; }
  .badge-review     { background: #fef3e0; color: #c48a10; }

  .meta-chip {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 0.72rem;
    color: var(--text-sub);
    background: var(--pink-50);
    padding: 3px 9px;
    border-radius: 999px;
    border: 1px solid var(--pink-100);
  }
  .meta-chip.deadline-near { color: #d44444; background: #fce8e8; border-color: #f7c0c0; }

  .priority-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    display: inline-block;
    flex-shrink: 0;
  }
  .p-high { background: #e24b4a; }
  .p-mid  { background: #e8a020; }
  .p-low  { background: #4aaa52; }

  /* progress bar */
  .prog-wrap {
    height: 5px;
    background: var(--pink-100);
    border-radius: 999px;
    margin-top: 10px;
    overflow: hidden;
  }
  .prog-bar {
    height: 100%;
    border-radius: 999px;
    background: linear-gradient(90deg, var(--pink-300), var(--pink-400));
    transition: width 0.5s ease;
  }

  /* empty */
  .empty-state {
    text-align: center;
    padding: 4rem 1rem;
    color: var(--text-hint);
  }
  .empty-icon { font-size: 2.5rem; margin-bottom: 10px; }
  .empty-state p { font-size: 0.88rem; }

  /* === MODAL === */
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(74, 42, 56, 0.25);
    backdrop-filter: blur(3px);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }
  .overlay.open { display: flex; }

  .modal {
    background: var(--white);
    border-radius: var(--radius-xl);
    padding: 1.75rem;
    width: 100%;
    max-width: 480px;
    border: 1.5px solid var(--pink-100);
    box-shadow: 0 8px 48px rgba(220,100,140,0.18);
    animation: popIn 0.2s ease;
  }
  @keyframes popIn {
    from { opacity: 0; transform: scale(0.96) translateY(8px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }

  .modal-title {
    font-family: 'Mitr', sans-serif;
    font-size: 1.05rem;
    font-weight: 500;
    color: var(--pink-500);
    margin-bottom: 1.25rem;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .form-group { margin-bottom: 12px; }
  .form-label {
    display: block;
    font-size: 0.78rem;
    font-weight: 500;
    color: var(--text-sub);
    margin-bottom: 5px;
  }
  .form-group input,
  .form-group textarea,
  .form-group select {
    width: 100%;
    font-family: 'Sarabun', sans-serif;
    font-size: 0.88rem;
    padding: 9px 13px;
    border: 1.5px solid var(--pink-100);
    border-radius: var(--radius-sm);
    background: var(--rose-50);
    color: var(--text-main);
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .form-group input:focus,
  .form-group textarea:focus,
  .form-group select:focus {
    border-color: var(--pink-300);
    box-shadow: 0 0 0 3px rgba(247,97,143,0.12);
    background: var(--white);
  }
  .form-group textarea { min-height: 80px; resize: vertical; }

  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  .modal-actions {
    display: flex;
    justify-content: flex-end;
    gap: 10px;
    margin-top: 1.25rem;
  }
  .btn-cancel {
    font-family: 'Sarabun', sans-serif;
    font-size: 0.88rem;
    padding: 9px 20px;
    border-radius: 999px;
    border: 1.5px solid var(--pink-100);
    background: var(--white);
    color: var(--text-sub);
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-cancel:hover { border-color: var(--pink-200); color: var(--pink-400); }
  .btn-save {
    font-family: 'Sarabun', sans-serif;
    font-size: 0.88rem;
    font-weight: 500;
    padding: 9px 24px;
    border-radius: 999px;
    border: none;
    background: var(--pink-400);
    color: white;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    box-shadow: 0 2px 10px rgba(240,100,140,0.22);
  }
  .btn-save:hover { background: var(--pink-500); }
  .btn-save:active { transform: scale(0.97); }

  /* decorative blobs */
  .blob {
    position: fixed;
    border-radius: 50%;
    filter: blur(60px);
    opacity: 0.18;
    pointer-events: none;
    z-index: 0;
  }
  .blob1 { width: 320px; height: 320px; background: #ffb3d1; top: -80px; right: -80px; }
  .blob2 { width: 240px; height: 240px; background: #ffd6e7; bottom: 10%; left: -60px; }

  @media (max-width: 540px) {
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
    .form-row { grid-template-columns: 1fr; }
    .site-header { padding: 1rem; }
  }
</style>
</head>
<body>

<div class="blob blob1"></div>
<div class="blob blob2"></div>

<!-- HEADER -->
<header class="site-header">
  <div>
    <div class="site-logo"><span class="blossom">🌸</span> Daily Work Tracker</div>
    <div class="header-date" id="today-date"></div>
  </div>
  <div style="display:flex;gap:10px;align-items:center;">
    <button class="btn-copy" id="btn-copy" onclick="copyToday()">
      📋 Copy สรุปวันนี้
    </button>
    <button class="btn-add" onclick="openModal()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      เพิ่มงาน
    </button>
  </div>
</header>

<!-- MAIN -->
<main class="main" style="position:relative;z-index:1;">

  <!-- STATS -->
  <div class="stats-grid">
    <div class="stat-card stat-all">
      <div class="stat-num" id="s-all">0</div>
      <div class="stat-label">งานทั้งหมด</div>
    </div>
    <div class="stat-card stat-proc">
      <div class="stat-num" id="s-proc">0</div>
      <div class="stat-label">กำลังทำ</div>
    </div>
    <div class="stat-card stat-done">
      <div class="stat-num" id="s-done">0</div>
      <div class="stat-label">เสร็จแล้ว</div>
    </div>
    <div class="stat-card stat-block">
      <div class="stat-num" id="s-block">0</div>
      <div class="stat-label">ติดขัด</div>
    </div>
  </div>

  <!-- FILTER -->
  <div class="filter-row">
    <span class="filter-label">กรอง:</span>
    <button class="filter-btn active" onclick="setFilter('all',this)">ทั้งหมด</button>
    <button class="filter-btn" onclick="setFilter('Not Start',this)">Not Start</button>
    <button class="filter-btn" onclick="setFilter('On Process',this)">On Process</button>
    <button class="filter-btn" onclick="setFilter('Review',this)">Review</button>
    <button class="filter-btn" onclick="setFilter('Success',this)">Success</button>
    <button class="filter-btn" onclick="setFilter('Blocked',this)">Blocked</button>
  </div>

  <!-- TASK LIST -->
  <div class="task-list" id="task-list"></div>

</main>

<!-- MODAL -->
<div class="overlay" id="overlay" onclick="closeIfOverlay(event)">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title-txt">
    <div class="modal-title">
      <span>🌷</span>
      <span id="modal-title-txt">เพิ่มงานใหม่</span>
    </div>
    <input type="hidden" id="edit-id">

    <div class="form-group">
      <label class="form-label">ชื่องาน *</label>
      <input type="text" id="f-name" placeholder="ชื่องาน หรือโปรเจกต์">
    </div>
    <div class="form-group">
      <label class="form-label">รายละเอียดที่ทำ</label>
      <textarea id="f-desc" placeholder="สิ่งที่ทำ, ความคืบหน้า, โน้ตสำคัญ..."></textarea>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Status</label>
        <select id="f-status">
          <option value="Not Start">Not Start</option>
          <option value="On Process">On Process</option>
          <option value="Review">Review</option>
          <option value="Success">Success</option>
          <option value="Blocked">Blocked</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Priority</label>
        <select id="f-priority">
          <option value="Mid">Mid</option>
          <option value="High">High</option>
          <option value="Low">Low</option>
        </select>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Deadline</label>
        <input type="date" id="f-deadline">
      </div>
      <div class="form-group">
        <label class="form-label">% ความคืบหน้า (0–100)</label>
        <input type="number" id="f-progress" min="0" max="100" placeholder="เช่น 50">
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">ผู้รับผิดชอบ / Assignee</label>
      <input type="text" id="f-assignee" placeholder="ชื่อ หรือทีม">
    </div>

    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">ยกเลิก</button>
      <button class="btn-save" onclick="saveTask()">💾 บันทึก</button>
    </div>
  </div>
</div>

<script>
  // ─── DATA ───────────────────────────────────────
  let tasks = [];
  let filterStatus = 'all';
  const STORAGE_KEY = 'dailyTrackerTasks_v1';

  function loadTasks() {
    try { tasks = JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
    catch(e) { tasks = []; }
    render();
  }
  function saveTasks() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
  }

  // ─── HELPERS ────────────────────────────────────
  function todayISO() { return new Date().toISOString().split('T')[0]; }
  function isoToThai(iso) {
    if (!iso) return '';
    const d = new Date(iso + 'T00:00:00');
    return d.toLocaleDateString('th-TH', { day:'numeric', month:'short', year:'numeric' });
  }
  function daysUntil(iso) {
    if (!iso) return null;
    const now = new Date(); now.setHours(0,0,0,0);
    return Math.ceil((new Date(iso + 'T00:00:00') - now) / 86400000);
  }
  function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

  const STATUS_BADGE = {
    'Not Start':  'badge-not-start',
    'On Process': 'badge-on-process',
    'Success':    'badge-success',
    'Blocked':    'badge-blocked',
    'Review':     'badge-review',
  };
  const STATUS_EMOJI = {
    'Not Start':  '⭕',
    'On Process': '🔵',
    'Success':    '✅',
    'Blocked':    '🚫',
    'Review':     '👀',
  };
  const PRIORITY_CLS = { High:'p-high', Mid:'p-mid', Low:'p-low' };
  const PRIORITY_EMOJI = { High:'🔴', Mid:'🟡', Low:'🟢' };

  // ─── RENDER ─────────────────────────────────────
  function render() {
    const filtered = filterStatus === 'all' ? tasks : tasks.filter(t => t.status === filterStatus);
    const list = document.getElementById('task-list');

    if (filtered.length === 0) {
      list.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">🌸</div>
          <p>${filterStatus === 'all' ? 'ยังไม่มีงาน กด "+ เพิ่มงาน" เพื่อเริ่มต้นได้เลย' : 'ไม่มีงานในหมวดนี้'}</p>
        </div>`;
    } else {
      list.innerHTML = filtered.map(t => {
        const d = daysUntil(t.deadline);
        const near = d !== null && d <= 2;
        let dlText = '';
        if (t.deadline) {
          if (d < 0) dlText = `เลยกำหนด ${Math.abs(d)} วัน`;
          else if (d === 0) dlText = 'วันนี้!';
          else dlText = `เหลือ ${d} วัน`;
        }
        const prog = Math.min(100, Math.max(0, parseInt(t.progress) || 0));

        return `
        <div class="task-card" data-id="${t.id}">
          <div class="task-top">
            <div class="task-name">${escHtml(t.name)}</div>
            <div class="task-actions">
              <button class="icon-btn" onclick="editTask('${t.id}')" title="แก้ไข">✏️</button>
              <button class="icon-btn" onclick="deleteTask('${t.id}')" title="ลบ">🗑️</button>
            </div>
          </div>
          ${t.desc ? `<div class="task-desc">${escHtml(t.desc)}</div>` : ''}
          <div class="task-meta">
            <span class="badge ${STATUS_BADGE[t.status] || 'badge-not-start'}">${STATUS_EMOJI[t.status] || ''} ${t.status}</span>
            ${t.priority ? `<span class="meta-chip"><span class="priority-dot ${PRIORITY_CLS[t.priority]}"></span>${t.priority}</span>` : ''}
            ${t.deadline ? `<span class="meta-chip${near ? ' deadline-near' : ''}">📅 ${isoToThai(t.deadline)}${dlText ? ' · ' + dlText : ''}</span>` : ''}
            ${t.assignee ? `<span class="meta-chip">👤 ${escHtml(t.assignee)}</span>` : ''}
            ${t.date ? `<span class="meta-chip">🕐 ${isoToThai(t.date)}</span>` : ''}
          </div>
          ${prog > 0 ? `<div class="prog-wrap"><div class="prog-bar" style="width:${prog}%"></div></div>` : ''}
        </div>`;
      }).join('');
    }

    // stats
    document.getElementById('s-all').textContent  = tasks.length;
    document.getElementById('s-proc').textContent = tasks.filter(t=>t.status==='On Process').length;
    document.getElementById('s-done').textContent = tasks.filter(t=>t.status==='Success').length;
    document.getElementById('s-block').textContent= tasks.filter(t=>t.status==='Blocked').length;
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ─── FILTER ─────────────────────────────────────
  function setFilter(status, el) {
    filterStatus = status;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    render();
  }

  // ─── MODAL ──────────────────────────────────────
  function openModal(id) {
    document.getElementById('modal-title-txt').textContent = id ? 'แก้ไขงาน' : 'เพิ่มงานใหม่';
    document.getElementById('edit-id').value = id || '';
    if (id) {
      const t = tasks.find(x => x.id === id);
      document.getElementById('f-name').value     = t.name || '';
      document.getElementById('f-desc').value     = t.desc || '';
      document.getElementById('f-status').value   = t.status || 'Not Start';
      document.getElementById('f-priority').value = t.priority || 'Mid';
      document.getElementById('f-deadline').value = t.deadline || '';
      document.getElementById('f-progress').value = t.progress || '';
      document.getElementById('f-assignee').value = t.assignee || '';
    } else {
      ['f-name','f-desc','f-deadline','f-progress','f-assignee'].forEach(id => document.getElementById(id).value = '');
      document.getElementById('f-status').value   = 'Not Start';
      document.getElementById('f-priority').value = 'Mid';
    }
    document.getElementById('overlay').classList.add('open');
    setTimeout(() => document.getElementById('f-name').focus(), 80);
  }

  function closeModal() { document.getElementById('overlay').classList.remove('open'); }
  function closeIfOverlay(e) { if (e.target === document.getElementById('overlay')) closeModal(); }

  function saveTask() {
    const name = document.getElementById('f-name').value.trim();
    if (!name) { document.getElementById('f-name').focus(); return; }
    const id = document.getElementById('edit-id').value;
    const task = {
      id: id || genId(),
      name,
      desc:     document.getElementById('f-desc').value.trim(),
      status:   document.getElementById('f-status').value,
      priority: document.getElementById('f-priority').value,
      deadline: document.getElementById('f-deadline').value,
      progress: document.getElementById('f-progress').value,
      assignee: document.getElementById('f-assignee').value.trim(),
      date: id ? (tasks.find(x=>x.id===id)?.date || todayISO()) : todayISO(),
    };
    if (id) { const i = tasks.findIndex(x=>x.id===id); tasks[i] = task; }
    else tasks.unshift(task);
    saveTasks();
    closeModal();
    render();
  }

  function editTask(id) { openModal(id); }

  function deleteTask(id) {
    if (!confirm('ลบงานนี้เลยนะ?')) return;
    tasks = tasks.filter(t => t.id !== id);
    saveTasks();
    render();
  }

  // ─── COPY TODAY ─────────────────────────────────
  function copyToday() {
    const today = todayISO();
    const todayTasks = tasks.filter(t => t.date === today);

    if (todayTasks.length === 0) {
      alert('ยังไม่มีงานวันนี้เลย 🌸');
      return;
    }

    const dateStr = new Date().toLocaleDateString('en-GB', { day:'2-digit', month:'2-digit', year:'numeric' }).replace(/\//g,'/');

    let lines = [];
    lines.push(`📅 ${dateStr}`);
    lines.push('นิว - Dashboard');
    lines.push('');

    todayTasks.forEach((t, i) => {
      lines.push(`${i + 1}. ${t.name} ( ${t.status} )`);
      if (t.desc) {
        t.desc.split('\n').forEach(dl => { if (dl.trim()) lines.push(`   - ${dl.trim()}`); });
      }
      if (i < todayTasks.length - 1) lines.push('');
    });

    const text = lines.join('\n');
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.getElementById('btn-copy');
      btn.textContent = '✅ Copied!';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.textContent = '📋 Copy สรุปวันนี้';
        btn.classList.remove('copied');
      }, 2000);
    }).catch(() => {
      const ta = document.createElement('textarea');
      ta.value = text; document.body.appendChild(ta);
      ta.select(); document.execCommand('copy');
      document.body.removeChild(ta);
      alert('Copy แล้ว! 🌸 วางใน Line ได้เลย');
    });
  }

  // keyboard: ESC closes modal
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

  // ─── INIT ───────────────────────────────────────
  document.getElementById('today-date').textContent = new Date().toLocaleDateString('th-TH', {
    weekday:'long', year:'numeric', month:'long', day:'numeric'
  });
  loadTasks();
</script>
</body>
</html>
